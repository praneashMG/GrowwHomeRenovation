<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Renovex BuildNest</title>
    <link rel="icon" href="assets/growwpark_logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1B4332',
                        accent: '#D4A373',
                        secondary: '#111111',
                        offWhite: '#F8F9FA'
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --color-background: #F8F9FA; --color-surface: #FFFFFF; --color-primary-text: #111111; --color-accent: #D4A373; --color-border: #E5E7EB; }
        .dark { --color-background: #111111; --color-surface: #1A1A1A; --color-primary-text: #F8F9FA; --color-border: #2A2A2A; }
        html, body { height: 100%; margin: 0; overflow-x: hidden; }
        body { background-color: var(--color-background); color: var(--color-primary-text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; padding: 1rem; transition: background 0.3s; }
        .auth-card { background-color: var(--color-surface); border: 1px solid var(--color-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); width: 100%; max-width: 1000px; border-radius: 2rem; overflow: hidden; }
        .control-bubble { background-color: var(--color-surface); border: 1px solid var(--color-border); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--color-primary-text); }
        .input-field { background-color: transparent; border: 1px solid var(--color-border); color: var(--color-primary-text); padding: 0.85rem 1rem; width: 100%; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 500; }
        .input-field:focus { border-color: var(--color-accent); outline: none; box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #1B4332 0%, #D4A373 100%); color: white; padding: 1rem; width: 100%; border-radius: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: 0.75rem; font-size: 0.75rem; font-weight: 700; transition: 0.2s; }
        .social-btn:hover { background-color: rgba(212, 163, 115, 0.05); border-color: var(--color-accent); }
        .architectural-grid { background-image: radial-gradient(var(--color-accent) 1px, transparent 1px); background-size: 20px 20px; }
        html[dir="rtl"] .md\:flex-row { flex-direction: row-reverse; }
        html[dir="rtl"] .text-left { text-align: right; }
    </style>
</head>
<body>

    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleRTL()" class="control-bubble" title="Language"><i class="fas fa-language"></i></button>
        <button onclick="toggleTheme()" class="control-bubble" title="Theme"><i class="fas fa-moon"></i></button>
    </div>

    <div class="auth-card flex flex-col md:flex-row">
        <div class="hidden md:flex md:w-5/12 relative min-h-[580px] overflow-hidden">
            <img src="assets/lo.png" class="absolute inset-0 w-full h-full object-cover" alt="Background">

            <div class="absolute inset-0 bg-primary/90"></div>

            <div class="absolute inset-0 architectural-grid opacity-10"></div>
            
            <div class="relative z-10 p-10 flex flex-col justify-between h-full w-full">
                <a href="index.html" class="flex items-center gap-2 shrink-0 group">
                    <span class="flex h-10 w-10 items-center justify-center rounded-full bg-accent text-white shadow-lg group-hover:scale-110 transition-transform">
                        <i class="fas fa-hammer text-lg"></i>
                    </span>
                    <div class="leading-tight">
                        <span class="block text-xl font-bold tracking-tight text-accent">Renovex</span>
                        <span class="block text-xs font-semibold text-accent uppercase tracking-widest">BuildNest</span>
                    </div>
                </a>
                <div>
                    <h2 class="text-4xl font-black text-white leading-tight mb-4 uppercase">Secure <br><span class="text-accent italic">Login</span></h2>
                    <p class="text-sm text-gray-300">Access your project dashboard and monitor structural updates in real-time.</p>
                </div>
            </div>
        </div>

        <div class="w-full md:w-7/12 p-8 lg:p-12 flex flex-col justify-center bg-white dark:bg-secondary">
            <a href="index.html" class="md:hidden flex items-center gap-2 mb-8 justify-center shrink-0 group">
                <span class="flex h-10 w-10 items-center justify-center rounded-full bg-accent text-white shadow-lg">
                    <i class="fas fa-hammer text-lg"></i>
                </span>
                <div class="leading-tight">
                    <span class="block text-xl font-bold tracking-tight text-accent">Renovex</span>
                    <span class="block text-xs font-semibold text-accent uppercase tracking-widest">BuildNest</span>
                </div>
            </a>

            <div class="mb-8 text-center">
                <h3 class="text-2xl font-black uppercase tracking-tight">Welcome Back</h3>
                <p class="text-[10px] opacity-50 uppercase tracking-[0.2em] mt-1 font-bold">Authorized Access Only</p>
            </div>

            <form onsubmit="handleAuth(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-accent mb-1.5 px-1">Email Address</label>
                    <input type="email" required class="input-field" placeholder="name@company.com">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-accent mb-1.5 px-1">Password</label>
                    <div class="relative">
                        <input type="password" required class="input-field pr-10" placeholder="••••••••">
                        <button type="button" onclick="togglePass(this)" class="absolute right-3 top-1/2 -translate-y-1/2 opacity-40 hover:text-accent transition-all">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                    <div class="mt-2 text-right">
                        <a href="#" class="text-[9px] font-bold text-primary dark:text-accent hover:underline uppercase tracking-widest">Forgot Password?</a>
                    </div>
                </div>

                <div class="flex items-center px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-3.5 h-3.5 rounded border-gray-300 accent-primary">
                        <span class="text-[10px] uppercase font-bold tracking-widest opacity-70 group-hover:opacity-100 transition-opacity">Remember Me</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary shadow-lg hover:scale-[1.01] transition-transform mt-2">
                    Login
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-white/10"></div></div>
                <div class="relative flex justify-center text-[8px] uppercase font-black tracking-widest"><span class="bg-white dark:bg-secondary px-4 text-gray-400">Social Gateways</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="social-btn"><i class="fab fa-google text-red-500"></i><span>Google</span></button>
                <button class="social-btn"><i class="fab fa-apple text-current"></i><span>Apple ID</span></button>
            </div>

            <p class="mt-8 text-center text-[10px] opacity-60 uppercase tracking-widest">New Architect? <a href="signup.html" class="text-accent font-black hover:underline">Register</a></p>
        </div>
    </div>

    <script>
        function toggleRTL() { const h = document.documentElement; h.setAttribute('dir', h.getAttribute('dir') === 'ltr' ? 'rtl' : 'ltr'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function togglePass(btn) {
            const input = btn.parentElement.querySelector('input');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.innerHTML = input.type === 'password' ? '<i class="fas fa-eye text-xs"></i>' : '<i class="fas fa-eye-slash text-xs"></i>';
        }
        function handleAuth(e) { 
            e.preventDefault(); 
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Logging in...'; 
            setTimeout(() => window.location.href = 'index.html', 1000); 
        }
    </script>
</body>
</html>
