<!DOCTYPE html>
<html lang="en" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Renovex BuildNest</title>
    <link rel="icon" href="assets/growwpark_logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1B4332', accent: '#D4A373', secondary: '#111111', offWhite: '#F8F9FA'
                    }
                }
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --color-background: #F8F9FA; --color-surface: #FFFFFF; --color-primary-text: #111111; --color-accent: #D4A373; --color-border: #E5E7EB; }
        .dark { --color-background: #0B0B0B; --color-surface: #141414; --color-primary-text: #F5F5F5; --color-border: #2A2A2A; }
        
        html, body { height: 100%; margin: 0; overflow-x: hidden; }
        body { background-color: var(--color-background); color: var(--color-primary-text); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; padding: 1rem; transition: background 0.3s; }
        
        .auth-card { background-color: var(--color-surface); border: 1px solid var(--color-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); width: 100%; max-width: 1000px; border-radius: 2rem; overflow: hidden; }
        .control-bubble { background-color: var(--color-surface); border: 1px solid var(--color-border); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--color-primary-text); }
        
        .input-field { background-color: transparent; border: 1px solid var(--color-border); color: var(--color-primary-text); padding: 0.85rem 1rem; width: 100%; border-radius: 0.75rem; font-size: 0.875rem; }
        .input-field:focus { border-color: var(--color-accent); outline: none; }
        
        .btn-primary { background: linear-gradient(135deg, #1B4332 0%, #D4A373 100%); color: white; padding: 1rem; width: 100%; border-radius: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; }
        .architectural-grid { background-image: radial-gradient(#D4A373 1px, transparent 1px); background-size: 20px 20px; }

        /* RTL Logic */
        html[dir="rtl"] .md\:flex-row { flex-direction: row-reverse; }
        html[dir="rtl"] .text-left { text-align: right; }
    </style>
</head>
<body>

    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleRTL()" class="control-bubble"><i class="fas fa-language"></i></button>
        <button onclick="toggleTheme()" class="control-bubble"><i class="fas fa-moon"></i></button>
    </div>

    <div class="auth-card flex flex-col md:flex-row">
        <div class="hidden md:flex md:w-5/12 relative bg-primary min-h-[580px]">
            <!-- BACKGROUND IMAGE -->
<img src="assets/hero.webp"
     class="absolute inset-0 w-full h-full object-cover">

<!-- DARK GREEN OVERLAY -->
<div class="absolute inset-0 bg-primary/90"></div>

<!-- GRID TEXTURE -->
<div class="absolute inset-0 architectural-grid opacity-5"></div>
            <div class="absolute inset-0 architectural-grid opacity-5"></div>
            
            <div class="relative z-10 p-10 flex flex-col justify-between h-full w-full">
              <div class="flex items-center gap-2 shrink-0 group">
    
    <span class="flex h-10 w-10 items-center justify-center rounded-full bg-accent text-white shadow-lg group-hover:scale-110 transition-transform">
        <i class="fas fa-hammer text-lg"></i>
    </span>

    <div class="leading-tight">
        <span class="block text-xl font-bold tracking-tight text-accent">Renovex</span>
        <span class="block text-xs font-semibold text-accent uppercase tracking-widest">BuildNest</span>
    </div>

</div>

                <div>
                    <h2 class="text-4xl font-black text-white leading-tight mb-4 uppercase">New <br><span class="text-accent italic">Legacy</span></h2>
                    <p class="text-sm text-gray-300">Join the collective of master builders and start your project today.</p>
                </div>
            </div>
        </div>

        <div class="w-full md:w-7/12 p-8 lg:p-12 flex flex-col justify-center bg-white dark:bg-secondary">
           <div class="md:hidden flex items-center gap-2 mb-8 justify-center shrink-0 group">
    
    <span class="flex h-10 w-10 items-center justify-center rounded-full bg-accent text-white shadow-lg">
        <i class="fas fa-hammer text-lg"></i>
    </span>

    <div class="leading-tight">
        <span class="block text-xl font-bold tracking-tight text-accent">Renovex</span>
        <span class="block text-xs font-semibold text-accent uppercase tracking-widest">BuildNest</span>
    </div>

</div>

            <div class="mb-8 text-center">
                <h3 class="text-2xl font-black uppercase tracking-tight text-primary dark:text-accent">Client Enrollment</h3>
                <p class="text-[10px] opacity-50 uppercase tracking-[0.2em] mt-1 font-bold">Start Your Journey</p>
            </div>

            <form onsubmit="handleAuth(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-accent mb-1 px-1 tracking-widest">First Name</label>
                        <input type="text" required class="input-field" placeholder="Arjun">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-accent mb-1 px-1 tracking-widest">Last Name</label>
                        <input type="text" required class="input-field" placeholder="Malhotra">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-accent mb-1 px-1 tracking-widest">Email Address</label>
                    <input type="email" required class="input-field" placeholder="name@domain.com">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-accent mb-1 px-1 tracking-widest">Create Security Key</label>
                    <input type="password" id="pass" required class="input-field" placeholder="••••••••">
                    <div class="mt-3">
                        <div class="w-full bg-gray-200 dark:bg-white/10 h-1.5 rounded-full overflow-hidden">
                            <div id="bar" class="h-full bg-red-500 w-0 transition-all duration-500"></div>
                        </div>
                        <p id="strength-text" class="text-[9px] mt-1.5 text-gray-400 font-bold uppercase tracking-wider">Foundation: Weak</p>
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" required class="w-3.5 h-3.5 rounded border-gray-300 accent-primary">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Accept <a href="#" class="text-accent underline">Construction Terms</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-primary shadow-lg hover:scale-[1.01] transition-transform mt-2">Confirm Enrollment</button>
            </form>

            <p class="mt-8 text-center text-[10px] opacity-60 uppercase tracking-widest">Already Enrolled? <a href="login.html" class="text-accent font-black hover:underline">Login</a></p>
        </div>
    </div>

    <script>
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        
        function toggleRTL() {
            const html = document.documentElement;
            const currentDir = html.getAttribute('dir');
            html.setAttribute('dir', currentDir === 'ltr' ? 'rtl' : 'ltr');
        }

        const passInput = document.getElementById('pass');
        const bar = document.getElementById('bar');
        const strengthText = document.getElementById('strength-text');

        passInput.addEventListener('input', () => {
            const val = passInput.value;
            let score = Math.min(val.length / 2, 5);
            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-blue-500', 'bg-primary'];
            const labels = ['Structural Risk', 'Weak Foundation', 'Standard Build', 'Strong Build', 'Fortified'];
            
            bar.style.width = (score * 20) + '%';
            bar.className = `h-full transition-all duration-500 ${colors[Math.floor(score)-1] || 'bg-red-500'}`;
            strengthText.innerText = `Foundation: ${labels[Math.floor(score)-1] || 'Weak'}`;
        });

        function handleAuth(e) { 
            e.preventDefault(); 
            e.target.querySelector('button').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>'; 
            setTimeout(() => window.location.href = 'login.html', 1000); 
        }
    </script>
</body>
</html>
